spring:
  application:
    name: bff

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Resource server da borda: valida o Bearer da app (JWKS do Cadastro) e o propaga downstream.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8080/oauth2/jwks}

server:
  port: 8090

# traceId (correlacao de requisicoes) gerado na borda e propagado downstream.
logging:
  pattern:
    level: "%5p [trace:%X{traceId:-}]"

servicos:
  cadastro: ${SERVICO_CADASTRO_URL:http://localhost:8080}
  app: ${SERVICO_APP_URL:http://localhost:8081}
  localizacao: ${SERVICO_LOCALIZACAO_URL:http://localhost:8082}
  midia: ${SERVICO_MIDIA_URL:http://localhost:8083}

cache:
  ttl-segundos: ${CACHE_TTL_SEGUNDOS:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    configs:
      downstream:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      app: { base-config: downstream }
      cadastro: { base-config: downstream }
      localizacao: { base-config: downstream }
      midia: { base-config: downstream }
  retry:
    configs:
      downstream:
        max-attempts: 2
        wait-duration: 200ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
    instances:
      app: { base-config: downstream }
      cadastro: { base-config: downstream }
      localizacao: { base-config: downstream }
      midia: { base-config: downstream }
